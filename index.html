<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AutoPost — Programme tes posts automatiquement</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #111118;
      --surface2: #1a1a24;
      --border: rgba(255,255,255,0.08);
      --border2: rgba(255,255,255,0.14);
      --text: #e8e8f0;
      --text2: #8888a0;
      --text3: #44445a;
      --accent: #6c63ff;
      --accent-bg: rgba(108,99,255,0.12);
      --success: #10b981;
      --success-bg: rgba(16,185,129,0.12);
      --danger: #ef4444;
      --danger-bg: rgba(239,68,68,0.12);
      --warning-bg: rgba(245,158,11,0.12);
      --warning: #f59e0b;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      padding: 0;
    }

    /* ── HEADER ── */
    header {
      border-bottom: 0.5px solid var(--border);
      padding: 0 2rem;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      background: rgba(10,10,15,0.9);
      backdrop-filter: blur(12px);
      z-index: 100;
    }

    .logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 20px;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
    }

    .status-badge {
      font-size: 12px;
      padding: 4px 12px;
      border-radius: 20px;
      border: 0.5px solid var(--border);
      color: var(--text2);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--text3);
      transition: background 0.3s;
    }

    .status-dot.online { background: var(--success); }

    /* ── LAYOUT ── */
    main {
      max-width: 640px;
      margin: 0 auto;
      padding: 2rem 1.5rem 4rem;
    }

    .page-title {
      font-family: 'Syne', sans-serif;
      font-size: 28px;
      font-weight: 800;
      margin-bottom: 4px;
      color: var(--text);
    }

    .page-sub {
      font-size: 14px;
      color: var(--text2);
      margin-bottom: 2rem;
    }

    /* ── TABS ── */
    .tabs {
      display: flex;
      gap: 2px;
      margin-bottom: 1.5rem;
      background: var(--surface);
      border-radius: 10px;
      padding: 4px;
      border: 0.5px solid var(--border);
    }

    .tab {
      flex: 1;
      padding: 8px;
      border: none;
      border-radius: 7px;
      background: transparent;
      color: var(--text2);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
    }

    .tab.active {
      background: var(--surface2);
      color: var(--text);
      border: 0.5px solid var(--border2);
    }

    /* ── CARD ── */
    .card {
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 12px;
    }

    /* ── LABEL ── */
    label {
      display: block;
      font-size: 11px;
      color: var(--text2);
      font-weight: 500;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    label span { color: var(--danger); }
    label .opt { color: var(--text3); font-size: 10px; }

    /* ── PLATFORM BUTTONS ── */
    .platforms {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    .plt-btn {
      padding: 8px 16px;
      border-radius: 8px;
      border: 0.5px solid var(--border2);
      background: transparent;
      color: var(--text2);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
    }

    .plt-btn:hover { border-color: var(--accent); color: var(--text); }

    .plt-btn.active {
      border-color: var(--accent);
      background: var(--accent-bg);
      color: var(--accent);
    }

    /* ── UPLOAD ZONE ── */
    .upload-zone {
      border: 0.5px dashed var(--border2);
      border-radius: 12px;
      padding: 2.5rem 1rem;
      text-align: center;
      cursor: pointer;
      transition: all 0.15s;
      margin-bottom: 20px;
    }

    .upload-zone:hover, .upload-zone.drag { border-color: var(--accent); background: var(--accent-bg); }

    .upload-icon { font-size: 28px; margin-bottom: 10px; }
    .upload-title { font-size: 14px; font-weight: 500; margin-bottom: 4px; }
    .upload-hint { font-size: 12px; color: var(--text2); }

    .file-preview {
      display: none;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      background: var(--surface2);
      border-radius: 10px;
      margin-bottom: 20px;
      border: 0.5px solid var(--border);
    }

    .file-thumb {
      width: 48px;
      height: 48px;
      border-radius: 8px;
      background: var(--accent-bg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
      overflow: hidden;
    }

    .file-thumb img { width: 100%; height: 100%; object-fit: cover; }

    .file-info { flex: 1; min-width: 0; }
    .file-name { font-size: 13px; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-bottom: 2px; }
    .file-size { font-size: 11px; color: var(--text2); }

    /* ── INPUTS ── */
    input[type="text"], input[type="datetime-local"], textarea, select {
      width: 100%;
      padding: 10px 14px;
      background: var(--surface2);
      border: 0.5px solid var(--border2);
      border-radius: 10px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      outline: none;
      transition: border-color 0.15s;
      margin-bottom: 20px;
    }

    input:focus, textarea:focus { border-color: var(--accent); }
    textarea { resize: vertical; line-height: 1.6; }
    input[type="datetime-local"] { color-scheme: dark; }

    .char-count { font-size: 11px; color: var(--text2); text-align: right; margin-top: -16px; margin-bottom: 20px; }

    /* ── TIME ROW ── */
    .time-row { display: grid; grid-template-columns: 1fr auto; gap: 10px; margin-bottom: 20px; }
    .time-row input { margin-bottom: 0; }

    .suggest-btn {
      padding: 10px 16px;
      background: var(--surface2);
      border: 0.5px solid var(--border2);
      border-radius: 10px;
      color: var(--text2);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.15s;
      height: fit-content;
    }

    .suggest-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* ── SUGGESTION BOX ── */
    .suggestion {
      display: none;
      padding: 10px 14px;
      background: var(--accent-bg);
      border: 0.5px solid rgba(108,99,255,0.3);
      border-radius: 10px;
      font-size: 13px;
      color: #a5a0ff;
      margin-bottom: 20px;
    }

    /* ── API URL ── */
    .api-url-row { margin-bottom: 20px; }
    .api-url-row input { font-family: monospace; font-size: 12px; color: var(--text2); margin-bottom: 0; }

    /* ── SUBMIT ── */
    .submit-btn {
      width: 100%;
      padding: 14px;
      background: var(--accent);
      border: none;
      border-radius: 12px;
      color: white;
      font-family: 'Syne', sans-serif;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.15s;
      letter-spacing: 0.5px;
    }

    .submit-btn:hover { opacity: 0.9; transform: translateY(-1px); }
    .submit-btn:active { transform: translateY(0); }
    .submit-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    /* ── MESSAGES ── */
    .msg {
      display: none;
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 13px;
      margin-top: 12px;
    }

    .msg.success { background: var(--success-bg); color: var(--success); }
    .msg.error { background: var(--danger-bg); color: var(--danger); }

    /* ── QUEUE CARDS ── */
    .post-card {
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
      margin-bottom: 8px;
      animation: fadeIn 0.2s ease;
    }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }

    .post-card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .post-platform { font-size: 11px; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; font-weight: 500; }
    .post-status { font-size: 11px; padding: 3px 10px; border-radius: 20px; font-weight: 500; }
    .post-status.published { background: var(--success-bg); color: var(--success); }
    .post-status.scheduled { background: var(--warning-bg); color: var(--warning); }
    .post-content-text { font-size: 13px; line-height: 1.5; color: var(--text); margin-bottom: 6px; }
    .post-date { font-size: 11px; color: var(--text2); }

    .empty-state { text-align: center; padding: 3rem; color: var(--text2); font-size: 14px; }

    /* ── QUEUE FILTER ── */
    .queue-config { display: flex; gap: 8px; margin-bottom: 16px; }
    .queue-config input { margin-bottom: 0; flex: 1; }
    .load-btn {
      padding: 10px 16px;
      background: var(--surface2);
      border: 0.5px solid var(--border2);
      border-radius: 10px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.15s;
    }

    .load-btn:hover { border-color: var(--accent); }

    /* ── REMOVE BTN ── */
    .remove-btn {
      padding: 4px 10px;
      background: transparent;
      border: 0.5px solid var(--danger);
      border-radius: 6px;
      color: var(--danger);
      font-size: 12px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-dot"></div>
    AutoPost
  </div>
  <div class="status-badge">
    <div class="status-dot" id="dot"></div>
    <span id="status-txt">non connecté</span>
  </div>
</header>

<main>
  <h1 class="page-title">Programme tes posts</h1>
  <p class="page-sub">Upload ta vidéo, choisis l'heure — on s'occupe du reste.</p>

  <div class="tabs">
    <button class="tab active" onclick="showTab('schedule', this)">📅 Nouveau post</button>
    <button class="tab" onclick="showTab('queue', this)">⏳ File d'attente</button>
  </div>

  <!-- ── SCHEDULE TAB ── -->
  <div id="tab-schedule">
    <div class="card">

      <label>Plateforme</label>
      <div class="platforms">
        <button class="plt-btn active" onclick="setPlt(this,'tiktok')">TikTok</button>
        <button class="plt-btn" onclick="setPlt(this,'instagram')">Instagram</button>
        <button class="plt-btn" onclick="setPlt(this,'twitter')">Twitter/X</button>
        <button class="plt-btn" onclick="setPlt(this,'linkedin')">LinkedIn</button>
      </div>

      <label id="media-label">Vidéo / Image <span>* requis pour TikTok</span></label>
      <div class="upload-zone" id="drop-zone" onclick="document.getElementById('file-input').click()">
        <div class="upload-icon">📎</div>
        <p class="upload-title">Clique ou glisse ton fichier ici</p>
        <p class="upload-hint" id="media-hint">MP4, MOV — max 500MB · JPG, PNG — max 10MB</p>
      </div>
      <input type="file" id="file-input" accept="video/*,image/*" style="display:none" onchange="handleFile(this)" />

      <div class="file-preview" id="file-preview">
        <div class="file-thumb" id="file-thumb"></div>
        <div class="file-info">
          <p class="file-name" id="file-name"></p>
          <p class="file-size" id="file-size"></p>
        </div>
        <button class="remove-btn" onclick="removeFile()">Supprimer</button>
      </div>

      <label>Légende / Description <span class="opt">optionnel</span></label>
      <textarea id="content" rows="3" placeholder="Ajoute une description, des hashtags..."></textarea>
      <p class="char-count" id="chars">0 caractères</p>

      <label>Date et heure de publication</label>
      <div class="time-row">
        <input type="datetime-local" id="s-date" />
        <button class="suggest-btn" onclick="suggestTime()">🧠 Meilleure heure</button>
      </div>

      <div class="suggestion" id="suggestion"></div>

      <label>URL de ton backend Railway</label>
      <div class="api-url-row">
        <input type="text" id="api-url" value="https://autopost-backend-production.up.railway.app" placeholder="https://..." />
      </div>

      <button class="submit-btn" id="submit-btn" onclick="schedule()">📅 Programmer ce post</button>
      <div class="msg" id="s-msg"></div>
    </div>
  </div>

  <!-- ── QUEUE TAB ── -->
  <div id="tab-queue" style="display:none;">
    <div class="queue-config">
      <input type="text" id="q-api" placeholder="URL backend Railway" value="https://autopost-backend-production.up.railway.app" />
      <input type="text" id="q-uid" placeholder="userId" style="max-width: 140px;" />
      <button class="load-btn" onclick="loadQueue()">Charger</button>
    </div>
    <div id="queue-content">
      <div class="empty-state">Entre ton userId et clique Charger</div>
    </div>
  </div>
</main>

<script>
  let plt = 'tiktok';
  let file = null;

  const BEST = {
    tiktok:    { hour: 19, label: '19h00 — pic d\'audience TikTok le soir' },
    instagram: { hour: 12, label: '12h00 — meilleure heure Instagram le midi' },
    twitter:   { hour: 8,  label: '8h00 — Twitter actif le matin' },
    linkedin:  { hour: 9,  label: '9h00 — LinkedIn en début de journée' },
  };

  const MEDIA = {
    tiktok:    { required: true,  hint: 'MP4, MOV — max 500MB · JPG, PNG — max 10MB',  tag: '* requis pour TikTok' },
    instagram: { required: true,  hint: 'MP4, MOV — max 500MB · JPG, PNG — max 30MB',  tag: '* requis pour Instagram' },
    twitter:   { required: false, hint: 'MP4 — max 512MB · JPG, PNG, GIF — max 5MB',   tag: '(optionnel)' },
    linkedin:  { required: false, hint: 'MP4 — max 200MB · JPG, PNG — max 100MB',      tag: '(optionnel)' },
  };

  // Init date
  const minDate = new Date(Date.now() + 3600000).toISOString().slice(0,16);
  document.getElementById('s-date').min = minDate;
  document.getElementById('s-date').value = minDate;

  function showTab(t, btn) {
    document.getElementById('tab-schedule').style.display = t === 'schedule' ? 'block' : 'none';
    document.getElementById('tab-queue').style.display    = t === 'queue'    ? 'block' : 'none';
    document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  }

  function setPlt(btn, p) {
    plt = p;
    document.querySelectorAll('.plt-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const m = MEDIA[p];
    document.getElementById('media-hint').textContent = m.hint;
    document.getElementById('media-label').innerHTML = `Vidéo / Image <span style="color:${m.required ? 'var(--danger)' : 'var(--text3)'}; font-size:11px;">${m.tag}</span>`;
    document.getElementById('file-input').accept = 'video/*,image/*';
  }

  function handleFile(input) {
    const f = input.files[0];
    if (!f) return;
    file = f;
    const isVid = f.type.startsWith('video/');
    const mb    = (f.size / 1024 / 1024).toFixed(1);
    const thumb = document.getElementById('file-thumb');
    thumb.textContent = isVid ? '🎬' : '🖼️';
    if (!isVid) {
      const r = new FileReader();
      r.onload = e => { thumb.innerHTML = `<img src="${e.target.result}" />`; };
      r.readAsDataURL(f);
    }
    document.getElementById('file-name').textContent = f.name;
    document.getElementById('file-size').textContent = `${mb} MB · ${isVid ? 'Vidéo' : 'Image'}`;
    document.getElementById('drop-zone').style.display = 'none';
    document.getElementById('file-preview').style.display = 'flex';
  }

  function removeFile() {
    file = null;
    document.getElementById('file-input').value = '';
    document.getElementById('drop-zone').style.display = 'block';
    document.getElementById('file-preview').style.display = 'none';
  }

  document.getElementById('content').addEventListener('input', function() {
    document.getElementById('chars').textContent = this.value.length + ' caractères';
  });

  // Drag and drop
  const dz = document.getElementById('drop-zone');
  dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag'); });
  dz.addEventListener('dragleave', () => dz.classList.remove('drag'));
  dz.addEventListener('drop', e => {
    e.preventDefault(); dz.classList.remove('drag');
    const f = e.dataTransfer.files[0];
    if (f) { const dt = new DataTransfer(); dt.items.add(f); document.getElementById('file-input').files = dt.files; handleFile(document.getElementById('file-input')); }
  });

  function suggestTime() {
    const best = BEST[plt];
    const d = new Date();
    d.setDate(d.getDate() + 1);
    d.setHours(best.hour, 0, 0, 0);
    document.getElementById('s-date').value = d.toISOString().slice(0,16);
    const sug = document.getElementById('suggestion');
    sug.style.display = 'block';
    sug.textContent = '🧠 ' + best.label;
  }

  async function schedule() {
    const content = document.getElementById('content').value.trim();
    const date    = document.getElementById('s-date').value;
    const api     = document.getElementById('api-url').value.trim().replace(/\/$/,'');
    const m       = MEDIA[plt];
    const btn     = document.getElementById('submit-btn');
    const msg     = document.getElementById('s-msg');
    msg.style.display = 'none';

    if (m.required && !file) { showMsg('Ajoute une vidéo ou image pour ' + plt, false); return; }
    if (!date) { showMsg('Choisis une date de publication', false); return; }

    btn.textContent = 'Envoi en cours...';
    btn.disabled = true;

    try {
      const r = await fetch(api + '/posts', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          userId: localStorage.getItem('ap_uid') || 'user_' + Date.now(),
          content: content || '',
          platform: plt,
          channelId: 'ch_' + plt,
          scheduled_at: date,
          media_name: file ? file.name : null,
          media_type: file ? file.type : null,
        })
      });
      const d = await r.json();
      if (d.success) {
        if (!localStorage.getItem('ap_uid')) localStorage.setItem('ap_uid', d.post.user_id);
        showMsg('✓ Post programmé pour le ' + new Date(date).toLocaleString('fr-FR'), true);
        document.getElementById('content').value = '';
        document.getElementById('chars').textContent = '0 caractères';
        document.getElementById('suggestion').style.display = 'none';
        removeFile();
        document.getElementById('dot').classList.add('online');
        document.getElementById('status-txt').textContent = 'connecté';
      } else {
        showMsg(d.error || 'Erreur inconnue', false);
      }
    } catch(e) {
      showMsg('Impossible de contacter le backend. Vérifie l\'URL Railway.', false);
    }

    btn.textContent = '📅 Programmer ce post';
    btn.disabled = false;
  }

  function showMsg(txt, ok) {
    const el = document.getElementById('s-msg');
    el.style.display = 'block';
    el.className = 'msg ' + (ok ? 'success' : 'error');
    el.textContent = txt;
  }

  async function loadQueue() {
    const api = document.getElementById('q-api').value.trim().replace(/\/$/,'');
    const uid = document.getElementById('q-uid').value.trim() || localStorage.getItem('ap_uid');
    if (!uid) { document.getElementById('queue-content').innerHTML = '<div class="empty-state">Entre ton userId</div>'; return; }
    document.getElementById('queue-content').innerHTML = '<div class="empty-state">Chargement...</div>';
    try {
      const r = await fetch(api + '/posts?userId=' + uid);
      const d = await r.json();
      const posts = d.posts || [];
      if (!posts.length) { document.getElementById('queue-content').innerHTML = '<div class="empty-state">Aucun post trouvé</div>'; return; }
      document.getElementById('queue-content').innerHTML = posts.map(p => `
        <div class="post-card">
          <div class="post-card-header">
            <span class="post-platform">${p.platform}${p.media_name ? ' · 📎' : ''}</span>
            <span class="post-status ${p.status}">${p.status === 'published' ? '✓ Publié' : '⏳ Programmé'}</span>
          </div>
          <p class="post-content-text">${p.content ? p.content.slice(0,120) + (p.content.length > 120 ? '...' : '') : '<em style="color:var(--text2)">Pas de légende</em>'}</p>
          <p class="post-date">📅 ${new Date(p.scheduled_at).toLocaleString('fr-FR')}</p>
        </div>
      `).join('');
    } catch(e) {
      document.getElementById('queue-content').innerHTML = '<div class="empty-state" style="color:var(--danger)">Erreur de connexion</div>';
    }
  }
</script>
</body>
</html>
